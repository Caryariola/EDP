<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Shopping Cart</title>
  </head>

  <body class="bg-gray-100 min-h-screen flex flex-col items-center">
    <div
      class="fixed inset-0 z-0"
      style="
        background: radial-gradient(
          125% 125% at 50% 10%,
          #fff 40%,
          #6366f1 100%
        );
      "
    ></div>

    <nav
      class="relative z-20 w-full bg-white shadow-md border-b border-blue-500 py-4 px-8 flex items-center justify-between"
    >
      <div class="flex flex-col">
        <h1 class="text-xl font-sans">
         <a href="/Home.html" class="font-bold text-blue-600"><span id="displayUsername" class="font-bold text-blue-600"></span>'s</a> Cart
        </h1>
        <p id="displayEmail" class="text-sm text-gray-500"></p>
      </div>

      <div class="flex items-center gap-4">
    <button 
      id="cart-btn" 
      class="relative p-2 text-gray-600 hover:text-blue-600 transition-colors duration-300 cursor-pointer"
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
      </svg>
      
      <span id="cart-count" class="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white">
        0
      </span>
    </button>

      <button
        id="log-btn"
        class="bg-blue-800 text-white rounded-lg px-6 py-2 hover:bg-red-600 transition duration-300 cursor-pointer text-sm"
      >
        <span id="logbutton" class="font-bold "></span>
      </button>
      </div>
    </nav>

    <main class="relative z-10 w-full max-w-5xl flex flex-col items-center py-10 px-4 gap-8">
  <div class="relative z-10 w-full flex flex-col items-center gap-8">
    
    <div id="shop" class="w-full bg-white rounded-lg shadow-xl border border-blue-500 overflow-hidden">
      
      <div id="cart-list" class="flex flex-col p-6 min-h-[300px] gap-4">
        <p class="text-center text-gray-400 py-10">Loading your cart...</p>
      </div>

      <div class="p-6 bg-blue-50 border-t border-blue-200 flex flex-col sm:flex-row justify-between items-center gap-6">
        <div class="flex flex-col items-center sm:items-start">
          <span class="text-xs font-bold text-blue-600 uppercase tracking-widest">Estimated Total</span>
          <span id="total-price" class="text-4xl font-black text-gray-900">$0.00</span>
        </div>

        <div class="flex gap-4 w-full sm:w-auto">
          <button onclick="clearCart()" class="px-6 py-3 text-sm font-bold text-red-500 hover:bg-red-50 rounded-lg transition-colors cursor-pointer">
            Clear Cart
          </button>
          <button class="flex-1 sm:flex-none bg-blue-800 text-white px-10 py-4 rounded-xl font-bold text-lg hover:bg-blue-700 hover:scale-[1.02] active:scale-95 transition-all shadow-lg cursor-pointer">
            Checkout
          </button>
        </div>
      </div>

    </div>

    <a href="./Home.html" class="text-blue-600 font-bold hover:underline">
      ← Back to Shopping
    </a>

  </div>
</main>

<script type="module" src="./js/Cart.js"></script>

    <script type="module" src="./js/Home.js"></script>
  </body>
</html>
