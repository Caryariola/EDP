<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Form Validation</title>
  </head>

  <body class="m-auto flex items-center justify-center h-screen bg-gray-100">
    <div class="min-h-screen w-full relative items-center justify-center flex">
      <div
        class="absolute inset-0 z-0"
        style="
          background: radial-gradient(
            125% 125% at 50% 10%,
            #fff 40%,
            #6366f1 100%
          );
        "
      ></div>

      <div class="relative inset-0 mb-auto justify-center flex z-10">
        <div
          id="home"
          class="w-[650px] h-[100px] bg-white flex  items-center rounded-lg shadow-lg shadow-blue-500/50 border-blue-500 border-1"
        >
          <div class="flex flex-col items-center gap-4 m-auto">
            <h1 class="text-2xl m-auto font-sans">
            Welcome
            <span id="displayUsername" class="text-2xl font-sans"> </span>!
          </h1>
          <p id="displayEmail" class="text-center m-auto text-gray-600"></p> 
          </div>

          <div class="flex  gap-2 m-auto">
            <button
              id="logout-btn"
              type="button"
              class="w-[200px] h-[35px] bg-blue-800 text-white rounded-lg px-5 mt-2 mb-5 hover:bg-gray-300 hover:text-black duration-300 ease-in-out cursor-pointer"
            >
              Logout
            </button>
          </div>
        </div>
      </div>

      
      
      
    </div>

    <script type="module" src="./js/Home.js">
    </script>
  </body>
</html>
