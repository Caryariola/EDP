<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" name="referrer" content="no-referrer" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <title>Shopping Cart</title>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col items-center">
  <div class="fixed inset-0 z-0" style="
        background: radial-gradient(
          125% 125% at 50% 10%,
          #fff 40%,
          #6366f1 100%
        );
      "></div>

  <nav
    class="relative z-20 w-full bg-white shadow-md border-b border-blue-500 py-4 px-8 flex items-center justify-between">
    <div class="flex flex-col tracking-tight">
      <h1 class="text-xl font-sans antialiased text-slate-800">
        Welcome
        <span id="displayUsername" class="font-extrabold text-blue-600 uppercase"></span>!
      </h1>
      <p id="displayEmail" class="text-sm font-medium text-slate-400"></p>
    </div>

    <div class="flex items-center gap-4">
      <button id="cart-btn"
        class="relative p-2 text-gray-600 hover:text-blue-600 transition-colors duration-300 cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
          class="w-7 h-7">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
        </svg>

        <span id="cart-count"
          class="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white">
          0
        </span>
      </button>

      <button id="log-btn"
        class="bg-blue-800 text-white rounded-lg px-6 py-2 hover:bg-red-600 transition duration-300 cursor-pointer text-sm">
        <span id="logbutton" class="font-bold "></span>
      </button>
    </div>
  </nav>

  <main class="relative z-10 w-full max-w-7xl flex flex-col items-center py-10 px-4 gap-8">

    <div class="relative z-10 w-full max-w-7xl flex flex-col items-center py-10 px-4 gap-8">
      <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@900&display=swap"
        rel="stylesheet">

      <div class="flex flex-col font-black tracking-tighter leading-none">
        <h1 class="text-8xl font-['Archivo_Black'] uppercase italic">
          The
          <span class="text-blue-600 drop-shadow-md">HUB</span>
        </h1>
      </div>
      <div
        class="flex flex-wrap gap-6 p-6 bg-white rounded-lg shadow-md border border-blue-200 w-full max-w-7xl justify-center items-end">
        <div class="flex flex-col gap-1">
          <label class="text-xs font-bold text-gray-500 uppercase">Category</label>
          <select id="category-filter" class="p-2 border border-blue-300 rounded-md bg-white text-sm outline-none w-40">
            <option value="">All Types</option>
            <option value="37">Clothes</option>
            <option value="36">Electronics</option>
            <option value="33">Furniture</option>
            <option value="35">Shoes</option>
            <option value="34">Miscellaneous</option>
          </select>
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs font-bold text-gray-500 uppercase">Min Price</label>
          <input type="number" id="min-price" placeholder="0"
            class="w-28 p-2 border border-blue-300 rounded-md outline-none focus:ring-2 focus:ring-blue-400" />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs font-bold text-gray-500 uppercase">Max Price</label>
          <input type="number" id="max-price" placeholder="1000"
            class="w-28 p-2 border border-blue-300 rounded-md outline-none focus:ring-2 focus:ring-blue-400" />
        </div>

        <button id="fbutton"
          class="bg-blue-800 text-white px-8 py-2 rounded-md hover:bg-blue-700 transition-colors cursor-pointer font-bold h-[42px]">
          Apply Filters
        </button>
      </div>

      <div id="shop" class="w-full max-w-7xl bg-white rounded-lg shadow-xl border border-blue-500 min-h-[500px]">
        <div id="cardcontainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6 p-6 w-full">
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./js/Home.js"></script>
</body>

</html>
