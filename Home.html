<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Shopping Cart</title>
  </head>

  <body class="bg-gray-100 min-h-screen flex flex-col items-center">
    <div
      class="fixed inset-0 z-0"
      style="
        background: radial-gradient(
          125% 125% at 50% 10%,
          #fff 40%,
          #6366f1 100%
        );
      "
    ></div>

    <nav
      class="relative z-20 w-full bg-white shadow-md border-b border-blue-500 py-4 px-8 flex items-center justify-between"
    >
      <div class="flex flex-col">
        <h1 class="text-xl font-sans">
          Welcome
          <span id="displayUsername" class="font-bold text-blue-600"></span>!
        </h1>
        <p id="displayEmail" class="text-sm text-gray-500"></p>
      </div>

      <button
        id="log-btn"
        class="bg-blue-800 text-white rounded-lg px-6 py-2 hover:bg-red-600 transition duration-300 cursor-pointer text-sm"
      >
        <span id="logbutton" class="font-bold "></span>
      </button>
    </nav>

    <main
      class="relative z-10 w-full max-w-7xl flex flex-col items-center py-10 px-4 gap-8"
    >
      <div
        class="relative z-10 w-full max-w-7xl flex flex-col items-center py-10 px-4 gap-8"
      >
        <div
          class="flex flex-wrap gap-6 p-6 bg-white rounded-lg shadow-md border border-blue-200 w-full max-w-7xl justify-center items-end"
        >
          <div class="flex flex-col gap-1">
            <label class="text-xs font-bold text-gray-500 uppercase"
              >Category</label
            >
            <select
              id="category-filter"
              class="p-2 border border-blue-300 rounded-md bg-white text-sm outline-none w-40"
            >
              <option value="">All Types</option>
              <option value="1">Clothes</option>
              <option value="2">Electronics</option>
              <option value="3">Furniture</option>
              <option value="4">Shoes</option>
            </select>
          </div>

          <div class="flex flex-col gap-1">
            <label class="text-xs font-bold text-gray-500 uppercase"
              >Min Price</label
            >
            <input
              type="number"
              id="min-price"
              placeholder="0"
              class="w-28 p-2 border border-blue-300 rounded-md outline-none focus:ring-2 focus:ring-blue-400"
            />
          </div>

          <div class="flex flex-col gap-1">
            <label class="text-xs font-bold text-gray-500 uppercase"
              >Max Price</label
            >
            <input
              type="number"
              id="max-price"
              placeholder="1000"
              class="w-28 p-2 border border-blue-300 rounded-md outline-none focus:ring-2 focus:ring-blue-400"
            />
          </div>

          <button
            id="fbutton"
            class="bg-blue-800 text-white px-8 py-2 rounded-md hover:bg-blue-700 transition-colors cursor-pointer font-bold h-[42px]"
          >
            Apply Filters
          </button>
        </div>

        <div
          id="shop"
          class="w-full max-w-7xl bg-white rounded-lg shadow-xl border border-blue-500 min-h-[500px]"
        >
          <div
            id="cardcontainer"
            class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6 p-6 w-full"
          ></div>
        </div>
      </div>
    </main>

    <script type="module" src="./js/Home.js"></script>
  </body>
</html>
